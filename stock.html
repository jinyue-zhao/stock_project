<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個股資料｜櫃買股票分析排行系統</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page">

        <header class="site-header">
            <div class="main-nav">
                <div class="brand">
                    <img class="site-logo" src="assets/logo.png" alt="櫃買市場資料查詢系統圖標">

                    <div class="brand-text">
                        <h1>櫃買股票分析排行系統</h1>
                    </div>
                </div>

                <nav class="nav-links">
                    <a href="index.html">首頁</a>
                    <a href="all.html">全部資料</a>
                    <a href="ranking.html">股票排行</a>
                </nav>
            </div>
        </header>

        <section class="search-card stock-summary-card">
            <div class="stock-summary-left">
                <h2 id="stockTitle">個股資料載入中...</h2>

                <p class="hint" id="stockSubtitle">
                    此頁顯示該股票最近 20 筆交易日的行情、法人與量能資料。
                </p>
            </div>

            <div class="stock-score-box" id="stockScoreBox">
                <div class="score-box-title">排行榜成績</div>
                <div class="score-box-main">--</div>
                <div class="score-box-sub">資料載入中...</div>
            </div>
        </section>

        <section class="stats-grid five">
            <div class="stat-card">
                <h3>資料筆數</h3>
                <p id="stockDataCount">--</p>
            </div>

            <div class="stat-card">
                <h3>最新收盤價</h3>
                <p id="latestClose">--</p>
            </div>

            <div class="stat-card">
                <h3>最新漲跌幅</h3>
                <p id="latestChange">--</p>
            </div>

            <div class="stat-card">
                <h3>最新法人買賣超</h3>
                <p id="latestInst">--</p>
            </div>

            <div class="stat-card">
                <h3>最新成交量</h3>
                <p id="latestVolume">--</p>
            </div>
        </section>

        <section class="table-card">
            <div class="table-title-row">
                <h2>最近 20 日資料</h2>
                <p id="displayNote">資料載入中...</p>
            </div>

            <p class="metric-click-hint">
                提示：點擊藍色指標名稱，例如「收盤價」、「漲跌幅」、「成交量」或「三大法人合計」，即可查看該指標最近 20 日走勢圖。
            </p>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>日期</th>

                            <th>
                                <button class="metric-header-btn" data-metric="close">收盤價</button>
                            </th>

                            <th>
                                <button class="metric-header-btn" data-metric="price_change_pct">漲跌幅</button>
                            </th>

                            <th>
                                <button class="metric-header-btn" data-metric="volume">成交量</button>
                            </th>

                            <th>
                                <button class="metric-header-btn" data-metric="foreign_net_buy">外資買賣超</button>
                            </th>

                            <th>
                                <button class="metric-header-btn" data-metric="investment_trust_net_buy">投信買賣超</button>
                            </th>

                            <th>
                                <button class="metric-header-btn" data-metric="dealer_net_buy">自營商買賣超</button>
                            </th>

                            <th>
                                <button class="metric-header-btn" data-metric="total_inst_net_buy">三大法人合計</button>
                            </th>

                            <th>
                                <button class="metric-header-btn" data-metric="inst_total_ratio">法人/成交量</button>
                            </th>

                            <th>
                                <button class="metric-header-btn" data-metric="turnover_rate">週轉率</button>
                            </th>

                            <th>
                                <button class="metric-header-btn" data-metric="margin_balance">融資餘額</button>
                            </th>
                        </tr>
                    </thead>

                    <tbody id="stockTable">
                        <tr>
                            <td colspan="11">資料載入中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </div>

    <script src="utils.js"></script>
    <script src="stock.js"></script>
</body>
</html>
