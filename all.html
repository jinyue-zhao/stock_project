<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部法人買賣超資料</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page">

        <header class="site-header">
            <div class="main-nav simple-header">
                <div class="brand">
                    <img class="site-logo" src="assets/logo.png" alt="櫃買市場資料查詢系統圖標">

                    <div class="brand-text">
                        <h1>櫃買市場資料查詢系統</h1>
                    </div>
                </div>

                <a class="back-link" href="index.html">回首頁</a>
            </div>
        </header>

        <section class="search-card">
            <h2>全部法人買賣超資料</h2>

            <div class="search-box">
                <input 
                    type="text" 
                    id="keywordInput" 
                    placeholder="輸入股票代號或名稱，例如 1815、富喬"
                >

                <button id="searchBtn" type="button">查詢</button>
            </div>

            <p class="hint">
                此頁每頁顯示 50 筆資料，可切換頁數查看完整資料。
            </p>
        </section>

        <section class="table-card">
            <div class="table-title-row">
                <h2 id="tableTitle">完整資料列表</h2>
                <p id="displayNote">資料載入中...</p>
            </div>

            <div class="pagination top-pagination">
                <button id="topPrevBtn" type="button">上一頁</button>
                <span id="topPageInfo">第 1 頁</span>
                <button id="topNextBtn" type="button">下一頁</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>股票代號</th>
                            <th>股票名稱</th>
                            <th>收盤價</th>
                            <th>漲跌幅</th>
                            <th>成交量</th>
                            <th>外資買賣超</th>
                            <th>投信買賣超</th>
                            <th>自營商買賣超</th>
                            <th>三大法人合計</th>
                            <th>法人/成交量</th>
                            <th>法人/發行股數</th>
                        </tr>
                    </thead>

                    <tbody id="dataTable">
                        <tr>
                            <td colspan="12">資料載入中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <button id="prevBtn" type="button">上一頁</button>
                <span id="pageInfo">第 1 頁</span>
                <button id="nextBtn" type="button">下一頁</button>
            </div>
        </section>

    </div>

    <script src="all.js"></script>
</body>
</html>
