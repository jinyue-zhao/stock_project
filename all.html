<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部今日法人買賣超資料</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page">

        <header class="site-header">
            <div class="main-nav">
                <div class="brand">
                    <img class="site-logo" src="assets/logo.png" alt="櫃買市場資料查詢系統圖標">

                    <div class="brand-text">
                        <h1>櫃買股票分析排行系統</h1>
                    </div>
                </div>

                <nav class="nav-links">
                    <a href="index.html">首頁</a>
                    <a href="all.html" class="active">今日全部資料</a>
                    <a href="ranking.html">股票排行</a>
                </nav>
            </div>
        </header>

        <section class="search-card">
            <h2>全部今日法人買賣超資料</h2>

            <div class="search-box">
                <input 
                    type="text" 
                    id="keywordInput" 
                    placeholder="輸入股票代號或名稱，例如 1815、富喬"
                >

                <button id="searchBtn" type="button">查詢</button>
            </div>

            <p class="hint">
                此頁每頁顯示 50 筆今日資料，可切換頁數查看完整資料。點擊任一股票列，可查看該股票最近 20 日資料。
            </p>
        </section>

        <section class="table-card">
            <div class="table-title-row">
                <p class="click-hint">提示：點擊任一股票列可查看該股票最近 20 日資料。</p>
                <h2 id="tableTitle">今日完整資料列表</h2>
                <p id="displayNote">資料載入中...</p>
            </div>

            <div class="pagination top-pagination">
                <button id="topPrevBtn" type="button">上一頁</button>
                <span id="topPageInfo">第 1 頁</span>

                <label class="page-jump-label">
                    跳至
                    <select id="topPageSelect"></select>
                    頁
                </label>

                <button id="topNextBtn" type="button">下一頁</button>
            </div>

            <div class="table-wrapper">
                <table class="all-data-table">
                    <thead>
                        <tr>
                            <th>股票代號</th>
                            <th>股票名稱</th>
                            <th>收盤價</th>
                            <th>漲跌幅</th>
                            <th>成交量</th>
                            <th>外資買賣超</th>
                            <th>投信買賣超</th>
                            <th>自營商買賣超</th>
                            <th>三大法人合計</th>
                            <th>法人/成交量</th>
                            <th>法人/發行股數</th>
                        </tr>
                    </thead>

                    <tbody id="dataTable">
                        <tr>
                            <td colspan="11">資料載入中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <button id="prevBtn" type="button">上一頁</button>
                <span id="pageInfo">第 1 頁</span>

                <label class="page-jump-label">
                    跳至
                    <select id="pageSelect"></select>
                    頁
                </label>

                <button id="nextBtn" type="button">下一頁</button>
            </div>
        </section>

    </div>

    <script src="utils.js"></script>
    <script src="all.js"></script>
</body>
</html>
